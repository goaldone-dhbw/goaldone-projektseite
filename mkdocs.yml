site_name: Goaldone Projekt Dokumentation
site_url: https://projekt.goaldone.de
site_author: Goaldone Team
repo_url: https://github.com/goaldone-dhbw/goaldone-projektseite

theme:
  name: material
  language: de
  logo: assets/logo.png
  features:
    - navigation.expand # Macht Kategorien in der Seitenleiste aufklappbar
  palette:
    # Optional: Dark Mode Schalter hinzufügen
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: orange
      toggle:
        icon: material/brightness-7
        name: In den Dark Mode wechseln
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: orange
      toggle:
        icon: material/brightness-4
        name: In den Light Mode wechseln
#extra:
#  consent:
#    title: "Diese Website verwendet Cookies"
#    description: "Wir verwenden Cookies, um die Nutzererfahrung zu verbessern und die Verwendung unserer Dokumentation zu überwachen.
#    Durch die weitere Nutzung der Website stimmen Sie der Verwendung von Cookies zu."

# Diese Erweiterungen erlauben die Button-Klassen in Markdown
markdown_extensions:
  - attr_list
  - md_in_html
  - tables

plugins:
  - search

nav:
  - Home: index.md
  - Entwicklungsteam: entwicklungsteam.md
  - Projektressourcen:
      - Projektseite: projektseite.md
      - Prototyp: prototyp.md
  - Risikoanalyse: risikoanalyse.md
  - Recherchebericht: recherchebericht.md
  - Lastenheft und Pflichtenheft: lasten_pflichtenheft.md
  - Planungsalgorithmus: planungsalgorithmus.md
  - Designbeschreibung: designbeschreibung.md
  - Diagramme: diagramme.md