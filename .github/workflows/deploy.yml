name: Deploy Docs to GitHub Pages

on:
  push:
    branches: ["main"] # oder "master", falls dein Hauptbranch so heißt
  workflow_dispatch:

# Notwendige Berechtigungen für GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generiere statische Seite
        run: python generate.py

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public' # Hierhin speichert unser Python-Skript

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4