name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches: ["master"] # Pass das an, falls dein Branch "master" heißt
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # Installiert MkDocs und das Material-Theme auf dem GitHub Server
      - name: Install dependencies
        run: pip install mkdocs-material

      # Baut die statische Seite in den Ordner "site"
      - name: Build MkDocs
        run: mkdocs build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Lädt den fertigen "site" Ordner hoch
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4